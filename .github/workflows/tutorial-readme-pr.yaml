name: tutorial-readme-pr
on:
  pull_request:
    branches: main
    paths:
      - tutorials/materials.yml

jobs:

  generate-readme:

    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Get commit message
        id: get-commit
        run: |
          msg=$(git log -1 --pretty=format:"%s")
          echo "message=$msg" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Setup CI tools
        uses: ./.github/actions/setup-ci-tools
        with:
          commit-message: ${{ steps.get-commit.outputs.message }}

      - name: Update READMEs
        run: nmaci generate-readmes

      - name: Commit post-processed files
        if: ${{ success() }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add '**/README.md'
          git diff-index --quiet HEAD || git commit -m "Update tutorial README"

      - name: Push post-processed files
        if: ${{ success() }}
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref }}
